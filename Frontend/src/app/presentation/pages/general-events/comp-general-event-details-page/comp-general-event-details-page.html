@if (isLoading()) {
    <app-comp-loading-screen />
} 
@else {
    <h1>Event-Details</h1>
    <button nz-button nzSize="large" (click)="navigateToEventsListPage()">
        <nz-icon nzType="arrow-left" nzTheme="outline" /> Zurück zu meinen Events
    </button>

    @if (isError()) {
        <div>Es ist ein Fehler aufgetreten.</div>
    } 
    @else {
        @if (generalEvent()) {
            @if (displayScreen === 'DETAILS_PAGE') {
                <div class="detailsContainer">
                    <div class="imageContainer">
                        <img src="Media_Picture.png" alt="Mediaevent-Bild" />
                    </div>
                    <div class="contentContainer">
                        <app-comp-general-event-display-content [inpGeneralEvent]="generalEvent()!" />
                    </div>
                </div>
                <div class="buttonBarContainer">
                    <button
                        nz-button
                        nzType="primary"
                        nzSize="large"
                        (click)="setDisplayScreen('EDIT_PAGE')"
                    >
                        <nz-icon nzType="edit" nzTheme="outline" />
                        Bearbeiten
                    </button>
                    <app-comp-delete-dialog
                        inpTitle="Event löschen"
                        [inpDescription]="
                            'Willst du das Event ' +
                            generalEvent()!.title +
                            ' wirklich löschen? Dies kann nicht rückgängig gemacht werden!'
                        "
                        (outDelete)="deleteEvent()"
                    />
                </div>
            } 
            @else {
                <h1>Event bearbeiten</h1>
                <app-comp-event-form
                    [inpMediaEvent]="generalEvent()"
                    (outSubmitForm)="submitForm($event)"
                    (outCancelForm)="cancelForm()"
                />
            }
        }
    }
}
